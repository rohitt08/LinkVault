spring.application.name=backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/linkvault}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:9876Rohit@}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# Security Configuration
linkvault.app.jwtSecret=${JWT_SECRET:LinkVaultSecretKeyMustBeVeryLongAndSecureForHS512Algorithm987654321}
linkvault.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
linkvault.app.jwtCookieName=linkvault_jwt
linkvault.app.jwtCookieSecure=${COOKIE_SECURE:false}
linkvault.app.frontendUrl=${FRONTEND_URL:http://localhost:5173}
